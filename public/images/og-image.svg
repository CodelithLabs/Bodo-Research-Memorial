    <rect x="800" y="800" width="40" height="40" fill="white"/>
    <rect x="840" y="840" width="40" height="40" fill="white"/>
    <rect x="880" y="880" width="40" height="40" fill="white"/>
    <rect x="920" y="920" width="40" height="40" fill="white"/>
    <rect x="960" y="960" width="40" height="40" fill="white"/>
    <rect x="1000" y="1000" width="40" height="40" fill="white"/>
    <rect x="1040" y="1040" width="40" height="40" fill="white"/>
