  <!-- Main Circle -->
  <circle cx="600" cy="280" r="120" fill="none" stroke="url(#gold)" stroke-width="3" opacity="0.3"/>
  <circle cx="600" cy="280" r="90" fill="none" stroke="url(#gold)" stroke-width="2" opacity="0.4"/>
  <circle cx="600" cy="280" r="60" fill="none" stroke="url(#gold)" stroke-width="1" opacity="0.5"/>
  
  <!-- Center Symbol -->
