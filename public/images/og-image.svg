  </text>
  
  <!-- Bottom Line -->
  <rect x="400" y="540" width="400" height="2" fill="url(#gold)" opacity="0.6"/>
  
  <!-- Decorative Dots -->
  <circle cx="300" cy="200" r="4" fill="#C9A227" opacity="0.5"/>
  <circle cx="900" cy="200" r="4" fill="#C9A227" opacity="0.5"/>
  <circle cx="350" cy="350" r="3" fill="#C9A227" opacity="0.3"/>
  <circle cx="850" cy="350" r="3" fill="#C9A227" opacity="0.3"/>
  <circle cx="280" cy="450" r="3" fill="#C9A227" opacity="0.4"/>
  <circle cx="920" cy="450" r="3" fill="#C9A227" opacity="0.4"/>
